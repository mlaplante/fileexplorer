name: Attach app to release

# Builds FileExplorer.app via Scripts/bundle.sh and uploads a zip to the
# release that triggered the run. The app is ad-hoc signed (no Developer ID),
# so downloaders must right-click → Open (or clear quarantine) on first launch.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    # Pinned: macos-latest floats between images (v5.1.0 drew macos-15 whose
    # Xcode 16.4 lacks `isolated deinit`; the same day macos-26 built fine).
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./Scripts/bundle.sh

      - name: Zip app
        run: ditto -c -k --keepParent build/FileExplorer.app "build/FileExplorer-${GITHUB_REF_NAME}.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$GITHUB_REF_NAME" "build/FileExplorer-${GITHUB_REF_NAME}.zip" --clobber
